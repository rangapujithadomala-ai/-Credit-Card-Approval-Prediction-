<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1A1A2E"/><stop offset="100%" style="stop-color:#0F0F23"/></linearGradient>
    <linearGradient id="e1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1565C0"/><stop offset="100%" style="stop-color:#0D47A1"/></linearGradient>
    <linearGradient id="e2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2E7D32"/><stop offset="100%" style="stop-color:#1B5E20"/></linearGradient>
    <linearGradient id="e3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#E53935"/><stop offset="100%" style="stop-color:#C62828"/></linearGradient>
    <filter id="sh"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">Entity-Relationship Diagram (ERD)</text>
  <text x="400" y="60" text-anchor="middle" fill="#9fa8da" font-size="12">Credit Card Approval Prediction System - Data Model</text>

  <!-- Entity 1: Transaction -->
  <rect x="50" y="100" width="250" height="170" rx="10" fill="url(#e1)" filter="url(#sh)"/>
  <text x="175" y="128" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">💳 Transaction</text>
  <line x1="70" y1="138" x2="280" y2="138" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="70" y="158" fill="#e0e0e0" font-size="11">PK Transaction_ID: INT</text>
  <text x="70" y="176" fill="#e0e0e0" font-size="11">Time: FLOAT</text>
  <text x="70" y="194" fill="#e0e0e0" font-size="11">Amount: FLOAT</text>
  <text x="70" y="212" fill="#e0e0e0" font-size="11">V1-V28: FLOAT (PCA)</text>
  <text x="70" y="230" fill="#e0e0e0" font-size="11">FK Class_ID: INT</text>
  <text x="70" y="248" fill="#e0e0e0" font-size="11">Timestamp: DATETIME</text>

  <!-- Entity 2: Class Label -->
  <rect x="480" y="100" width="250" height="140" rx="10" fill="url(#e3)" filter="url(#sh)"/>
  <text x="605" y="128" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🏷️ Class Label</text>
  <line x1="500" y1="138" x2="710" y2="138" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="500" y="158" fill="#e0e0e0" font-size="11">PK Class_ID: INT</text>
  <text x="500" y="176" fill="#e0e0e0" font-size="11">Class: TINYINT (0/1)</text>
  <text x="500" y="194" fill="#e0e0e0" font-size="11">Label: VARCHAR(20)</text>
  <text x="500" y="212" fill="#e0e0e0" font-size="11">Description: TEXT</text>
  <text x="500" y="230" fill="#e0e0e0" font-size="11">Count: INT</text>

  <!-- Entity 3: ML Model -->
  <rect x="480" y="320" width="250" height="140" rx="10" fill="url(#e2)" filter="url(#sh)"/>
  <text x="605" y="348" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🤖 ML Model</text>
  <line x1="500" y1="358" x2="710" y2="358" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="500" y="378" fill="#e0e0e0" font-size="11">PK Model_ID: INT</text>
  <text x="500" y="396" fill="#e0e0e0" font-size="11">Name: VARCHAR(50)</text>
  <text x="500" y="414" fill="#e0e0e0" font-size="11">Type: VARCHAR(50)</text>
  <text x="500" y="432" fill="#e0e0e0" font-size="11">File_Path: VARCHAR(255)</text>
  <text x="500" y="450" fill="#e0e0e0" font-size="11">Metrics: JSON</text>

  <!-- Entity 4: Prediction -->
  <rect x="50" y="320" width="250" height="170" rx="10" fill="url(#e2)" filter="url(#sh)"/>
  <text x="175" y="348" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📊 Prediction</text>
  <line x1="70" y1="358" x2="280" y2="358" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="70" y="378" fill="#e0e0e0" font-size="11">PK Prediction_ID: INT</text>
  <text x="70" y="396" fill="#e0e0e0" font-size="11">FK Transaction_ID: INT</text>
  <text x="70" y="414" fill="#e0e0e0" font-size="11">FK Model_ID: INT</text>
  <text x="70" y="432" fill="#e0e0e0" font-size="11">Result: TINYINT (0/1)</text>
  <text x="70" y="450" fill="#e0e0e0" font-size="11">Probability: FLOAT</text>
  <text x="70" y="468" fill="#e0e0e0" font-size="11">Confidence: FLOAT</text>

  <!-- Relationships -->
  <line x1="300" y1="170" x2="475" y2="160" stroke="#fff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="472,156 480,160 472,164" fill="#fff"/>
  <text x="375" y="155" fill="#9fa8da" font-size="11">N:1</text>
  <text x="350" y="140" fill="#9fa8da" font-size="10">belongs_to</text>

  <line x1="175" y1="270" x2="175" y2="315" stroke="#fff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="171,312 175,320 179,312" fill="#fff"/>
  <text x="155" y="298" fill="#9fa8da" font-size="11">1:1</text>
  <text x="195" y="298" fill="#9fa8da" font-size="10">generates</text>

  <line x1="300" y1="390" x2="475" y2="390" stroke="#fff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="472,386 480,390 472,394" fill="#fff"/>
  <text x="375" y="375" fill="#9fa8da" font-size="11">1:N</text>
  <text x="365" y="405" fill="#9fa8da" font-size="10">used_by</text>

  <text x="400" y="520" text-anchor="middle" fill="#555" font-size="11">ER Diagram - Credit Card Approval Prediction System | 2026</text>
</svg>
